# ============================================
# values.yaml — Valores por defecto del chart
# Sobreescribir con: helm install -f values-prod.yaml
# ============================================

# ── Configuración global ──────────────────────────────────
global:
  namespace: devops-portfolio
  environment: production

# ── Base de datos ─────────────────────────────────────────
postgres:
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  credentials:
    database: notesdb
    user: postgres
    password: devops123    # sobreescribir en prod con --set
  storage:
    size: 1Gi
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

# ── Backend Flask ─────────────────────────────────────────
backend:
  image:
    repository: mayramedina96/devops-portfolio
    tag: "latest"
    pullPolicy: Always
  replicas: 2
  port: 5000
  env:
    APP_ENV: production
    APP_VERSION: "1.0.0"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# ── Frontend Nginx ────────────────────────────────────────
frontend:
  image:
    repository: mayramedina96/devops-portfolio
    tag: "frontend-v1.0"
    pullPolicy: Always
  replicas: 2
  port: 80
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

# ── Ingress ───────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: devops-portfolio.local
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"

# ── Monitoreo (opcional) ──────────────────────────────────
monitoring:
  enabled: false
  prometheusPort: 9090
