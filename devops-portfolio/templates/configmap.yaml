apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "devops-portfolio.labels" . | nindent 4 }}
data:
  DB_HOST:       "postgres-service"
  DB_PORT:       "5432"
  DB_NAME:       {{ .Values.postgres.credentials.database | quote }}
  APP_ENV:       {{ .Values.backend.env.APP_ENV | quote }}
  APP_VERSION:   {{ .Values.backend.env.APP_VERSION | quote }}
  PORT:          {{ .Values.backend.port | quote }}
